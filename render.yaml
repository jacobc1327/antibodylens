services:
  - type: web
    name: antibodylens-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -b 0.0.0.0:$PORT app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: antibodylens-db
          property: connectionString
      # Set after Netlify deploy (comma-separated allowed origins)
      - key: CORS_ORIGINS
        sync: false

databases:
  - name: antibodylens-db
    plan: free
